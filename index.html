<head>

    j=d.createElement(s);j.async=!0;j.src='https://cdn.fundraiseup.com/widget/'+a;
    t.parentNode.insertBefore(j,t);o.s=Date.now();o.v=4;o.h=w.location.href;o.l=[];

    <style>
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            background-color: #f8f9fa;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        .demo-card {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            max-width: 450px;
            width: 90%;
        }
        h1 { color: #212529; margin-bottom: 15px; font-size: 24px; }
        p { color: #6c757d; margin-bottom: 30px; font-size: 16px; }
        .donation-button {
            background-color: #ff5a5f;
            color: white;
            padding: 16px 32px;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 18px;
            display: inline-block;
            transition: background 0.3s ease;
        }
        .donation-button:hover { background-color: #e04a4f; }
    </style>
</head>
<body>

    <div class="demo-card">
        <h1>Helping Hand Charity</h1>
        <p>Fundraise Up & Google Analytics 4 Demo</p>
        
        <a href="#XJKDHSTQ" class="donation-button">Donate $700</a>
    </div>

    <script>
      // Triggers when the checkout modal opens
      FundraiseUp.on('checkoutOpen', function(details) {
          console.log("GA4: begin_checkout triggered");
          gtag('event', 'begin_checkout', {
              'currency': 'USD',
              'value': 700.00,
              'items': [{
                  'item_name': 'Donation',
                  'item_id': 'helping_hand_700'
              }]
          });
      });

      // Triggers when the $700 donation is successful
      FundraiseUp.on('donationComplete', function(details) {
          console.log("GA4: purchase triggered");
          gtag('event', 'purchase', {
              'transaction_id': details.donation.id,
              'value': 700.00, 
              'currency': 'USD',
              'items': [{
                  'item_name': 'Donation',
                  'item_id': 'helping_hand_700',
                  'price': 700.00,
                  'quantity': 1
              }]
          });
      });
    </script>

</body>
</html>
