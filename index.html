<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Helping Hand Demo - GA4 Integration</title>

    <script async src="https://www.googletagmanager.com/gtag/js?id=G-19T2SLD00R"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-19T2SLD00R'); 
    </script>

    <script>(function(w,d,s,n,a){if(!w[n]){var l='call,catch,on,once,set,then,track'
    .split(','),i,o=function(n){return'function'==typeof n?o.l.push([arguments])&&o
    :function(){return o.l.push([n,arguments])&&o}},t=d.getElementsByTagName(s)[0],
    j=d.createElement(s);j.async=!0;j.src='https://cdn.fundraiseup.com/widget/'+a;
    t.parentNode.insertBefore(j,t);o.s=Date.now();o.v=4;o.h=w.location.href;o.l=[];
    for(i=0;i<7;i++)o[l[i]]=o(l[i]);

    })(window,document,'script','FundraiseUp','AEMZUDUM');</script>

    <style>
        /* Centers the card perfectly in the middle of the screen */
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            background-color: #f0f2f5;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        .demo-card {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-width: 400px;
            width: 90%;
        }
        h1 { color: #1a1a1a; margin-bottom: 10px; font-size: 24px; }
        p { color: #666; margin-bottom: 30px; line-height: 1.5; }
        .donation-button {
            background-color: #ff5a5f;
            color: white;
            padding: 18px 36px;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 18px;
            display: inline-block;
            transition: background 0.3s ease;
        }
        .donation-button:hover {
            background-color: #e04a4f;
        }
    </style>
</head>
<body>

    <div class="demo-card">
        <h1>Helping Hand</h1>
        <p>Demonstration of Google Analytics 4<br>and Fundraise Up Integration</p>
        
        <a href="#XJKDHSTQ" class="donation-button">Donate $700 Now</a>
    </div>

    <script>
      // Track the moment the checkout window is opened
      FundraiseUp.on('checkoutOpen', function() {
          console.log("Event: begin_checkout sent to GA4");
          gtag('event', 'begin_checkout', {
              'currency': 'USD',
              'value': 700.00
          });
      });

      // Track the successful $700 donation
      FundraiseUp.on('donationComplete', function(details) {
          console.log("Event: purchase sent to GA4");
          gtag('event', 'purchase', {
              'transaction_id': details.donation.id,
              'value': 700.00, // Hardcoded to 700 for the task requirement
              'currency': 'USD',
              'items': [{
                  'item_name': 'Donation',
                  'item_id': 'helping_hand_demo',
                  'price': 700.00,
                  'quantity': 1
              }]
          });
      });
    </script>

</body>
</html>
