    <style>
        html, body { height: 100%; margin: 0; padding: 0; }
        body {
            display: flex; justify-content: center; align-items: center; 
            text-align: center; font-family: sans-serif; background-color: #f8f9fa;
        }
        .demo-card {
            background: white; padding: 40px; border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05); max-width: 450px; width: 90%;
        }
        h1 { color: #212529; margin-bottom: 15px; font-size: 24px; }
        p { color: #6c757d; margin-bottom: 30px; font-size: 16px; }
        .donation-button {
            background-color: #ff5a5f; color: white; padding: 16px 32px;
            text-decoration: none; border-radius: 8px; font-weight: 600;
            font-size: 18px; display: inline-block; cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="demo-card">
        <h1>Helping Hand Charity</h1>
        <p>Fundraise Up & Google Analytics 4 Demo</p>
        
        <a href="#XJKDHSTQ" class="donation-button">Donate $700</a>
    </div>

    <script>
      // Tracking: Checkout Open
      FundraiseUp.on('checkoutOpen', function() {
          gtag('event', 'begin_checkout', {
              'value': 700,
              'currency': 'USD',
              'items': [{ 'item_name': 'Donation', 'item_id': 'demo_gift' }]
          });
      });

      // Tracking: Donation Complete
      FundraiseUp.on('donationComplete', function(details) {
          gtag('event', 'purchase', {
              'transaction_id': details.donation.id,
              'value': 700, 
              'currency': 'USD',
              'items': [{ 'item_name': 'Donation', 'item_id': 'demo_gift' }]
          });
      });
    </script>

</body>
</html>
