<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Helping Hand Demo</title>

    <!-- Google Analytics 4 -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-19T2SLD00R"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-19T2SLD00R');
    </script>

    <!-- Fundraise Up Widget -->
    <script>(function(w,d,s,n,a){if(!w[n]){var l='call,catch,on,once,set,then,track'
    .split(','),i,o=function(n){return'function'==typeof n?o.l.push([arguments])&&o
    :function(){return o.l.push([n,arguments])&&o}},t=d.getElementsByTagName(s)[0],
    j=d.createElement(s);j.async=!0;j.src='https://cdn.fundraiseup.com/widget/'+a;
    t.parentNode.insertBefore(j,t);o.s=Date.now();o.v=4;o.h=w.location.href;o.l=[];
    for(i=0;i<7;i++)o[l[i]]=o(l[i]);w[n]=o}
    })(window,document,'script','FundraiseUp','AEMZUDUM');</script>

    <style>
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f8f9fa;
        }
        .demo-card {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            max-width: 450px;
            width: 90%;
        }
        h1 {
            color: #212529;
            margin-bottom: 15px;
            font-size: 24px;
        }
        p {
            color: #6c757d;
            margin-bottom: 30px;
            font-size: 16px;
        }
        .donation-button {
            background-color: #ff5a5f;
            color: white;
            padding: 16px 32px;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 18px;
            display: inline-block;
            transition: background 0.3s ease;
        }
        .donation-button:hover {
            background-color: #e04a4f;
        }
    </style>
</head>
<body>
    <div class="demo-card">
        <h1>Helping Hand Charity</h1>
        <p>Fundraise Up & Google Analytics 4 Demo</p>

        <!-- testmode=yes for testing with Stripe test cards -->
        <a href="#XJKDHSTQ?testmode=yes" class="donation-button">Donate $800</a>
    </div>

    <script>
      // Fired when the donation checkout modal opens
      FundraiseUp.on('checkoutOpen', function(details) {

        // Push to dataLayer (works with GTM and GA4)
        window.dataLayer.push({
          event: 'begin_checkout',
          ecommerce: {
            currency: 'USD',
            value: details.amount || 0,
            items: [{
              item_name: 'Donation',
              item_id: details.campaign && details.campaign.id ? details.campaign.id : 'demo_gift',
              price: details.amount || 0,
              quantity: 1
            }]
          }
        });

        // Also fire directly via gtag for GA4
        gtag('event', 'begin_checkout', {
          currency: 'USD',
          value: details.amount || 0,
          items: [{
            item_name: 'Donation',
            item_id: details.campaign && details.campaign.id ? details.campaign.id : 'demo_gift',
            price: details.amount || 0,
            quantity: 1
          }]
        });
      });

      // Fired when the donation is successfully completed
      FundraiseUp.on('donationComplete', function(details) {

        // Push to dataLayer
        window.dataLayer.push({
          event: 'purchase',
          ecommerce: {
            transaction_id: details.donation.id,
            value: details.donation.amount,
            currency: details.donation.currency || 'USD',
            items: [{
              item_name: 'Donation',
              item_id: details.campaign && details.campaign.id ? details.campaign.id : 'demo_gift',
              price: details.donation.amount,
              quantity: 1
            }]
          }
        });

        // Also fire directly via gtag for GA4
        gtag('event', 'purchase', {
          transaction_id: details.donation.id,
          value: details.donation.amount,
          currency: details.donation.currency || 'USD',
          items: [{
            item_name: 'Donation',
            item_id: details.campaign && details.campaign.id ? details.campaign.id : 'demo_gift',
            price: details.donation.amount,
            quantity: 1
          }]
        });
      });
    </script>
</body>
</html>
