<html lang="en">
<head>

      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-19T2SLD00R'); 
    </script>

    .split(','),i,o=function(n){return'function'==typeof n?o.l.push([arguments])&&o
    :function(){return o.l.push([n,arguments])&&o}},t=d.getElementsByTagName(s)[0],
    j=d.createElement(s);j.async=!0;j.src='https://cdn.fundraiseup.com/widget/'+a;
    t.parentNode.insertBefore(j,t);o.s=Date.now();o.v=4;o.h=w.location.href;o.l=[];

    <style>
        /* Centering Logic */
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            background-color: #f0f2f5;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            font-family: -apple-system, sans-serif;
        }

        .card {
            background: white;
            padding: 50px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            max-width: 400px;
        }

        h1 { color: #1a1a1a; margin-bottom: 8px; }
        p { color: #666; margin-bottom: 24px; }

        .donation-button {
            background-color: #ff5a5f;
            color: white;
            padding: 16px 32px;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 18px;
            display: inline-block;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Helping Hand</h1>
        <p>GA4 & Fundraise Up Integration</p>
        
        <a href="#XJKDHSTQ?test=true" class="donation-button">Donate $700</a>
    </div>

    <script>
      // Track when the user opens the checkout
      FundraiseUp.on('checkoutOpen', function() {
          gtag('event', 'begin_checkout', {
              'event_category': 'FundraiseUp',
              'event_label': 'Demo'
          });
      });

      // Track the $700 Purchase
      FundraiseUp.on('donationComplete', function(details) {
          gtag('event', 'purchase', {
              'transaction_id': details.donation.id,
              'value': 700.00,
              'currency': 'USD',
              'items': [{
                  'item_name': 'Donation',
                  'item_id': 'HelpingHand_Demo'
              }]
          });
      });
    </script>

</body>
</html>
