    <div class="container">

        <a href="#XJKDHSTQ" class="donation-button">Donate $700 Now</a>
    </div>

    <script>
      // This part listens for Fundraise Up events
      FundraiseUp.on('checkoutOpen', function(details) {
          console.log("Checkout opened!");
          gtag('event', 'begin_checkout', {
              'event_category': 'FundraiseUp',
              'event_label': 'Checkout Opened'
          });
      });

      FundraiseUp.on('donationComplete', function(details) {
          console.log("Donation successful!");
          // This sends the $700 purchase data to your Google Analytics
          gtag('event', 'purchase', {
              'transaction_id': details.donation.id,
              'value': details.donation.amount,
              'currency': details.donation.currency,
              'items': [{
                  'item_name': 'Donation',
                  'item_id': 'fundraise_up_widget',
                  'price': details.donation.amount,
                  'quantity': 1
              }]
          });
      });
    </script>
